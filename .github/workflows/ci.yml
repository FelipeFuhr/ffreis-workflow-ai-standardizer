name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflows-policy:
    timeout-minutes: 15
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4 # v1.0.3

  fmt:
    timeout-minutes: 15
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@706807616c7887b62bf1f5c72050db843add3828 # main
    with:
      working-directory: .

  lint:
    timeout-minutes: 15
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@706807616c7887b62bf1f5c72050db843add3828 # main
    with:
      working-directory: .

  build:
    timeout-minutes: 30
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-build.yml@706807616c7887b62bf1f5c72050db843add3828 # main
    with:
      working-directory: .

  test:
    timeout-minutes: 30
    if: ${{ !github.event.pull_request.draft }}
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@706807616c7887b62bf1f5c72050db843add3828 # main
    with:
      working-directory: .

  # Validates all task YAML configs parse and have required fields.
  # This catches malformed tasks before they reach production.
  tasks-validate:
    timeout-minutes: 15
    name: Validate task configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: make build
      - run: ./bin/standardizer tasks validate
