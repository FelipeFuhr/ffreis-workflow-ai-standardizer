name: Run standardizer

on:
  schedule:
    - cron: '50 0 9 * *'  # monthly scattered (was: 0 9 1 * *)
  workflow_dispatch:
    inputs:
      task:
        description: 'task name to run (empty = all)'
        required: false
        default: ''
      repo:
        description: 'repo slug to filter (empty = all)'
        required: false
        default: ''
      model:
        description: 'model override'
        required: false
        default: 'claude-sonnet-4-6'
      dry_run:
        description: 'dry run (true = print prompts only, no API calls)'
        type: boolean
        required: false
        default: false

concurrency:
  group: standardizer-run
  cancel-in-progress: true

jobs:
  run:
    timeout-minutes: 15
    name: Run tasks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Run standardizer
        env:
          LLM_API_KEY:    ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:   ${{ vars.LLM_BASE_URL }}
          GH_TOKEN:       ${{ secrets.FLEET_WRITE_TOKEN }}
          INPUT_TASK:     ${{ inputs.task }}
          INPUT_REPO:     ${{ inputs.repo }}
          INPUT_MODEL:    ${{ inputs.model }}
          INPUT_DRY_RUN:  ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          args=("--output-dir" "output/")
          [ -n "$INPUT_TASK" ]          && args+=("--task"    "$INPUT_TASK")
          [ -n "$INPUT_REPO" ]          && args+=("--repo"    "$INPUT_REPO")
          [ -n "$INPUT_MODEL" ]         && args+=("--model"   "$INPUT_MODEL")
          [ "$INPUT_DRY_RUN" = "true" ] && args+=("--dry-run")
          ./bin/standardizer run "${args[@]}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: run-summary-${{ github.run_number }}
          path: output/summary.json
          retention-days: 30
